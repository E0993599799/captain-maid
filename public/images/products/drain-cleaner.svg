<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250">
  <!-- Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="250" fill="url(#grad)"/>
  
  <!-- Product Bottle -->
  <rect x="50" y="40" width="100" height="140" fill="#2563eb" stroke="#1d4ed8" stroke-width="3" rx="8"/>
  <rect x="60" y="50" width="80" height="100" fill="#60a5fa" opacity="0.6"/>
  <rect x="80" y="30" width="40" height="15" fill="#1d4ed8" stroke="#0d47a1" stroke-width="1" rx="2"/>
  <circle cx="100" cy="28" r="5" fill="#fbbf24"/>
  
  <!-- Shine effect -->
  <ellipse cx="85" cy="70" rx="15" ry="25" fill="white" opacity="0.3"/>
  
  <!-- Label -->
  <rect x="60" y="85" width="80" height="40" fill="white" opacity="0.9" rx="3"/>
  <text x="100" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">Clean</text>
  
  <!-- Base -->
  <ellipse cx="100" cy="185" rx="60" ry="15" fill="#1d4ed8" opacity="0.3"/>
</svg>
