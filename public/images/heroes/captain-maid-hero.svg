<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#02A6E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1070B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="180" r="120" fill="#EAF6FD" opacity="0.3"/>

  <!-- Legs -->
  <rect x="160" y="340" width="25" height="130" rx="12" fill="#1070B0"/>
  <rect x="215" y="340" width="25" height="130" rx="12" fill="#1070B0"/>

  <!-- Shoes -->
  <ellipse cx="172.5" cy="470" rx="20" ry="15" fill="#000"/>
  <ellipse cx="227.5" cy="470" rx="20" ry="15" fill="#000"/>

  <!-- Body -->
  <path d="M 140 200 Q 140 160 200 160 Q 260 160 260 200 L 260 340 Q 260 360 200 360 Q 140 360 140 340 Z" fill="url(#bodyGradient)"/>

  <!-- Cape -->
  <path d="M 150 200 Q 100 220 80 320 Q 100 340 140 340 L 140 200" fill="#FF1493" opacity="0.8"/>
  <path d="M 250 200 Q 300 220 320 320 Q 300 340 260 340 L 260 200" fill="#FF1493" opacity="0.8"/>

  <!-- Arms -->
  <rect x="100" y="220" width="40" height="90" rx="20" fill="#FFD9E8"/>
  <rect x="260" y="220" width="40" height="90" rx="20" fill="#FFD9E8"/>

  <!-- Gloves -->
  <circle cx="120" cy="310" r="18" fill="white"/>
  <circle cx="300" cy="310" r="18" fill="white"/>

  <!-- Head -->
  <circle cx="200" cy="100" r="55" fill="#FFD9E8"/>

  <!-- Hair -->
  <path d="M 145 70 Q 200 20 255 70" fill="#8B4513" stroke="none"/>
  <circle cx="160" cy="50" r="12" fill="#8B4513"/>
  <circle cx="240" cy="50" r="12" fill="#8B4513"/>

  <!-- Cap/Crown -->
  <path d="M 150 45 Q 200 10 250 45 L 245 75 Q 200 55 155 75 Z" fill="url(#capGradient)"/>
  <circle cx="200" cy="25" r="8" fill="#FFD700"/>

  <!-- Eyes -->
  <circle cx="180" cy="90" r="6" fill="#001360"/>
  <circle cx="220" cy="90" r="6" fill="#001360"/>
  <circle cx="182" cy="88" r="2" fill="white"/>
  <circle cx="222" cy="88" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M 185 110 Q 200 120 215 110" stroke="#FF1493" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Belt -->
  <rect x="140" y="330" width="120" height="20" rx="4" fill="#FFD700"/>
  <circle cx="200" cy="340" r="12" fill="#FF1493"/>

  <!-- Emblem on chest -->
  <circle cx="200" cy="260" r="25" fill="white" opacity="0.3"/>
  <text x="200" y="270" font-size="24" text-anchor="middle" fill="#FF1493" font-weight="bold">C</text>

  <!-- Stars around character -->
  <g opacity="0.5">
    <text x="80" y="150" font-size="32">✨</text>
    <text x="320" y="200" font-size="28">⭐</text>
    <text x="90" y="320" font-size="24">✨</text>
    <text x="310" y="280" font-size="26">⭐</text>
  </g>
</svg>
