name: Schema Validation

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'cms-arigeo/src/payload/collections/**'
      - 'cms-arigeo/payload.config.ts'
      - 'cms-arigeo/package.json'
  pull_request:
    branches: [main, develop, staging]
    paths:
      - 'cms-arigeo/src/payload/collections/**'
      - 'cms-arigeo/payload.config.ts'
      - 'cms-arigeo/package.json'

jobs:
  schema-validation:
    name: Validate Payload Schema
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: cd cms-arigeo && pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: cd cms-arigeo && npm run lint 2>&1 | tee lint-output.txt
        continue-on-error: true

      - name: Validate Payload config
        run: cd cms-arigeo && npx payload validate 2>&1 | tee payload-validate.txt
        continue-on-error: false

      - name: Generate Payload types
        run: cd cms-arigeo && npm run payload generate:types

      - name: Verify types generated
        run: cd cms-arigeo && test -f src/payload-types.ts && echo "✓ payload-types.ts generated"

      - name: Build Next.js
        run: cd cms-arigeo && npm run build

      - name: Archive validation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs-node-${{ matrix.node-version }}
          path: cms-arigeo/*.txt
          retention-days: 7

      - name: Comment PR on validation
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lintLog = fs.readFileSync('cms-arigeo/lint-output.txt', 'utf8');
            const hasErrors = lintLog.includes('error');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: hasErrors
                ? '❌ **Schema Validation Failed**\n\n```\n' + lintLog.slice(-500) + '\n```'
                : '✅ **Schema Validation Passed** (Node ' + '${{ matrix.node-version }}' + ')'
            });

  database-compatibility:
    name: Test Database Compatibility
    runs-on: ubuntu-latest
    needs: schema-validation

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cms_arigeo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: cd cms-arigeo && pnpm install --frozen-lockfile

      - name: Test schema against PostgreSQL
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/cms_arigeo_test
        run: |
          cd cms-arigeo
          npm start &
          sleep 10
          curl http://localhost:3000/api/graphql || echo "GraphQL endpoint test"
          kill %1 || true

      - name: Verify database schema created
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/cms_arigeo_test
        run: |
          psql $DATABASE_URL -c "
            SELECT COUNT(*) as table_count
            FROM information_schema.tables
            WHERE table_schema = 'public';" || echo "Schema verification"

  migration-simulation:
    name: Simulate Migration
    runs-on: ubuntu-latest
    needs: schema-validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run migration validation script
        run: |
          cd cms-arigeo
          chmod +x scripts/validate-migration.sh
          # Simulate staging validation (skip actual DB connection)
          echo "Validating migration script syntax..."
          bash -n scripts/validate-migration.sh || {
            echo "❌ Migration script has syntax errors"
            exit 1
          }
          echo "✓ Migration script is valid"

      - name: Check for breaking changes
        run: |
          cd cms-arigeo
          # Scan for risky patterns in collection changes
          if grep -r "dropField\|deleteCollection" src/payload/collections/ 2>/dev/null; then
            echo "⚠️ Warning: Destructive schema changes detected"
            echo "Please verify these changes are intentional and documented"
          else
            echo "✓ No destructive schema changes detected"
          fi

summary-report:
    name: Validation Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [schema-validation, database-compatibility, migration-simulation]

    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.schema-validation.result }}" = "failure" ] || \
             [ "${{ needs.database-compatibility.result }}" = "failure" ] || \
             [ "${{ needs.migration-simulation.result }}" = "failure" ]; then
            echo "❌ Schema validation pipeline failed"
            exit 1
          else
            echo "✅ All schema validations passed"
          fi
